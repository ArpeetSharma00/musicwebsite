<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Next-Gen Music Player</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="music-container">
        <h1>Next-Gen Music Player</h1>
        <div class="player">
            <audio id="audio-player" src="assets/song1.mp3"></audio>
            <div class="controls">
                <button id="prev"><i>⏮</i></button>
                <button id="play"><i>▶️</i></button>
                <button id="next"><i>⏭</i></button>
            </div>
            <p id="current-song">Now Playing: Song 1</p>
        </div>
        <ul class="playlist">
            <li data-src="assets/song1.mp3">Song 1</li>
            <li data-src="assets/song2.mp3">Song 2</li>
            <li data-src="assets/song3.mp3">Song 3</li>
        </ul>
    </div>
    <script src="script.js"></script>
</body>
</html>
