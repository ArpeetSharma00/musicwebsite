<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Website</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Login and Signup Page -->
    <div id="auth-container">
        <div id="auth-box">
            <h2>Login / Sign Up</h2>
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <button onclick="login()">Enter</button>
        </div>
    </div>

    <!-- Main Website -->
    <div id="main-container" class="hidden">
        <header>
            <div class="logo" onclick="toggleDropdown()">🎵 Music</div>
            <input type="text" id="searchBar" placeholder="Search for songs..." oninput="searchSongs()">
            <div class="profile">👤</div>
        </header>

        <div id="dropdown" class="dropdown hidden">
            <ul>
                <li>Home</li>
                <li>Trending</li>
                <li>Library</li>
                <li>Settings</li>
            </ul>
        </div>

        <main>
            <h2>Recommended Playlists</h2>
            <div id="playlists">
                <div class="playlist">🔥 Top Hits</div>
                <div class="playlist">🎸 Rock Classics</div>
                <div class="playlist">🎶 Chill Vibes</div>
            </div>

            <h2>Top Artists</h2>
            <div id="artists">
                <div class="artist">🎤 Artist 1</div>
                <div class="artist">🎧 Artist 2</div>
                <div class="artist">🥁 Artist 3</div>
            </div>

            <h2>Search Results</h2>
            <div id="searchResults"></div>
        </main>

        <div id="player" class="hidden">
            <p id="songTitle">Song Title</p>
            <button onclick="likeSong()">❤️ Like</button>
            <button onclick="addToPlaylist()">➕ Add to Playlist</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
